name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome check packages/core packages/servers/jp-calendar

      - name: Typecheck
        run: pnpm --filter @plugrail/core --filter @plugrail/jp-calendar run typecheck

      - name: Test (Vitest)
        run: pnpm --filter @plugrail/core --filter @plugrail/jp-calendar --if-present run test
